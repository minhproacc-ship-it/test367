<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caro vs AI Siêu Tốc</title>
    <style>
        :root {
            --bg: #0f172a;
            --board-bg: #1e293b;
            --cell: #334155;
            --cell-hover: #475569;
            --x-color: #f87171;
            --o-color: #38bdf8;
            --text: #e2e8f0;
            --accent: #8b5cf6;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        /* LANDING */
        #landing { text-align: center; animation: fadeUp 0.6s ease; }
        #landing h1 { font-size: 2.8rem; margin: 0 0 8px; background: linear-gradient(135deg, #f87171, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #landing p { margin: 0 0 24px; color: #94a3b8; }
        #playBtn {
            padding: 16px 40px; font-size: 1.2rem; font-weight: 600;
            background: linear-gradient(135deg, var(--accent), #ec4899);
            color: white; border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.35);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #playBtn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(139, 92, 246, 0.5); }
        .hint { font-size: 0.8rem; color: #64748b; margin-top: 16px; }

        /* PRANK */
        #prankOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .fakePopup {
            position: absolute; background: #1e293b; border: 1px solid var(--danger);
            border-radius: 10px; width: 280px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: float 2s infinite ease-in-out;
        }
        .popupHeader { background: linear-gradient(90deg, #ef4444, #b91c1c); color: white; padding: 8px 12px; font-weight: 600; font-size: 0.85rem; }
        .popupBody { padding: 14px; font-size: 0.85rem; color: #cbd5e1; text-align: center; line-height: 1.4; }
        #fakeLoader { text-align: center; z-index: 10000; }
        .loader-icon { font-size: 2.5rem; animation: spin 1s linear infinite; margin-bottom: 8px; }
        .prog-track { width: 240px; height: 6px; background: #334155; border-radius: 3px; margin: 12px auto 6px; overflow: hidden; }
        .prog-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ef4444, #f59e0b); transition: width 0.3s; }
        .loader-text { font-family: monospace; color: var(--danger); font-size: 0.95rem; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-6px) rotate(1deg); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* GAME */
        #gameContainer { display: none; text-align: center; }
        #status { font-size: 1.1rem; margin: 10px 0 14px; height: 24px; color: #94a3b8; }
        #board {
            display: grid; grid-template-columns: repeat(15, 32px); grid-template-rows: repeat(15, 32px);
            gap: 3px; background: var(--board-bg); padding: 8px; border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .cell {
            background: var(--cell); border-radius: 5px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; cursor: pointer; transition: all 0.15s;
        }
        .cell:hover:not(.taken) { background: var(--cell-hover); transform: scale(0.96); }
        .cell.taken { cursor: default; }
        .cell.x { color: var(--x-color); text-shadow: 0 0 8px rgba(248, 113, 113, 0.4); }
        .cell.o { color: var(--o-color); text-shadow: 0 0 8px rgba(56, 189, 248, 0.4); }
        .cell.last { box-shadow: 0 0 0 2px #fff, 0 0 12px rgba(255,255,255,0.3); }
        button.reset-btn {
            margin-top: 18px; padding: 10px 28px; font-size: 0.95rem; background: var(--accent);
            color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        button.reset-btn:hover { background: #7c3aed; }
        @media (max-width: 600px) {
            #board { grid-template-columns: repeat(15, 20px); grid-template-rows: repeat(15, 20px); gap: 2px; }
            .cell { font-size: 14px; border-radius: 3px; }
        }
    </style>
</head>
<body>
    <div id="landing">
        <h1>🎮 Caro AI Siêu Tốc</h1>
        <p>Thử sức trí tuệ nhân tạo tối ưu cho trình duyệt</p>
        <button id="playBtn" onclick="startPrank()">CHƠI NGAY</button>
        <p class="hint">💡 Nhấn ESC để bỏ qua hiệu ứng</p>
    </div>

    <div id="prankOverlay"></div>

    <div id="gameContainer">
        <h2 style="margin:0 0 6px">🎮 Caro vs AI</h2>
        <div id="status">Lượt của bạn (X)</div>
        <div id="board"></div>
        <button class="reset-btn" onclick="resetGame()">Chơi lại</button>
    </div>

    <script>
        // ================= PRANK =================
        let prankTimers = [];
        function startPrank() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('prankOverlay').style.display = 'flex';
            const msgs = [
                "🦠 PHÁT HIỆN MÃ ĐỘC TẤN CÔNG!", "⚠️ MÁY BẠN ĐANG BỊ XÂM NHẬP...",
                "💀 3 FILE HỆ THỐNG BỊ MÃ HÓA!", "📡 ĐANG GỬI DỮ LIỆU VỀ SERVER...",
                "🔒 CAM TRƯỚC MẶT ĐANG BỊ THEO DÕI", "💾 Ổ C: 99% FULL... ĐANG XÓA HỆ ĐIỀU HÀNH",
                "🤖 AI ĐÃ CHIẾM QUYỀN KIỂM SOÁT!", "🚨 KHÔNG ĐƯỢC TẮT MÁY!"
            ];
            msgs.forEach((m,i) => prankTimers.push(setTimeout(()=>createPopup(m), i*450)));
            const loader = document.createElement('div'); loader.id='fakeLoader';
            loader.innerHTML=`<div class="loader-icon">⚙️</div><div class="loader-text">QUÉT HỆ THỐNG... 0%</div><div class="prog-track"><div id="progBar" class="prog-bar"></div></div>`;
            document.getElementById('prankOverlay').appendChild(loader);
            let p=0;
            let pi=setInterval(()=>{p=Math.min(p+Math.random()*15+4,100); document.getElementById('progBar').style.width=p+'%'; document.querySelector('.loader-text').textContent=`QUÉT HỆ THỐNG... ${Math.floor(p)}%`;},350);
            prankTimers.push(pi);
            prankTimers.push(setTimeout(endPrank, 5500));
        }
        function createPopup(t){
            const p=document.createElement('div'); p.className='fakePopup';
            p.style.top=(15+Math.random()*55)+'%'; p.style.left=(10+Math.random()*65)+'%';
            p.innerHTML=`<div class="popupHeader">⚠️ CẢNH BÁO BẢO MẬT</div><div class="popupBody">${t}</div>`;
            document.getElementById('prankOverlay').appendChild(p);
        }
        function endPrank(){prankTimers.forEach(t=>clearTimeout(t)); prankTimers=[]; document.getElementById('prankOverlay').style.display='none'; document.getElementById('gameContainer').style.display='block'; initBoard();}
        document.addEventListener('keydown', e=>{if(e.key==='Escape'&&document.getElementById('prankOverlay').style.display==='flex')endPrank();});

        // ================= AI CARO TỐI ƯU =================
        const SIZE = 15, EMPTY = 0, HUMAN = 1, AI = 2;
        const DIRS = [[0,1],[1,0],[1,1],[1,-1]];
        let board = Array(SIZE).fill().map(()=>Array(SIZE).fill(EMPTY));
        let gameOver = false, isAiThinking = false, lastMove = null;

        // ✅ Kiểm tra thắng cục bộ (nhanh hơn quét toàn bàn)
        function checkWinAround(player, r, c) {
            for (let [dr, dc] of DIRS) {
                let count = 1;
                for (let i=1; i<5; i++) { let nr=r+dr*i, nc=c+dc*i; if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===player) count++; else break; }
                for (let i=1; i<5; i++) { let nr=r-dr*i, nc=c-dc*i; if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===player) count++; else break; }
                if (count >= 5) return true;
            }
            return false;
        }

        // ✅ Tìm nước thắng/chặn ngay lập tức (ưu tiên tuyệt đối)
        function getImmediateMove() {
            let cands = [];
            for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(board[r][c]===EMPTY) cands.push({r,c});
            // AI thắng?
            for(let {r,c} of cands) { board[r][c]=AI; if(checkWinAround(AI,r,c)){board[r][c]=EMPTY; return {r,c};} board[r][c]=EMPTY; }
            // Chặn người?
            for(let {r,c} of cands) { board[r][c]=HUMAN; if(checkWinAround(HUMAN,r,c)){board[r][c]=EMPTY; return {r,c};} board[r][c]=EMPTY; }
            return null;
        }

        // ✅ Đánh giá nhanh 1 ô (cho việc chọn ứng viên)
        function scoreCell(r, c) {
            let s = 0;
            for (let [dr, dc] of DIRS) {
                let line = [];
                for(let i=-2;i<=2;i++) { let nr=r+dr*i, nc=c+dc*i; line.push((nr<0||nr>=SIZE||nc<0||nc>=SIZE)?0:board[nr][nc]); }
                let k=line.join('');
                if(k.includes('0,2,2,2,0')) s+=6000;
                if(k.includes('2,2,0,2,2')||k.includes('2,0,2,2,2')||k.includes('2,2,2,0,2')) s+=12000;
                if(k.includes('0,1,1,1,0')) s+=800;
                if(k.includes('1,1,0,1,1')||k.includes('1,0,1,1,1')||k.includes('1,1,1,0,1')) s+=2500;
                s += line.filter(x=>x===AI).length * 15;
            }
            return s;
        }

        // ✅ Lấy tối đa 10 ứng viên tốt nhất
        function getCandidates() {
            let has = board.flat().some(x=>x!==EMPTY);
            if (!has) return [{r:7,c:7}];
            let moves = new Map();
            for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) {
                if(board[r][c]!==EMPTY) continue;
                let near=false;
                for(let dr=-2;dr<=2&&!near;dr++) for(let dc=-2;dc<=2&&!near;dc++) {
                    let nr=r+dr, nc=c+dc;
                    if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]!==EMPTY) near=true;
                }
                if(near) moves.set(`${r},${c}`, scoreCell(r,c));
            }
            return Array.from(moves.entries()).map(([k,v])=>{let [r,c]=k.split(',').map(Number);return{r,c,score:v};}).sort((a,b)=>b.score-a.score).slice(0, 10);
        }

        // ✅ Hàm đánh giá bàn cờ (tối ưu cho lá)
        function evaluate() {
            let ai=0, hu=0;
            // Chỉ đếm pattern cơ bản để tránh quét chậm
            for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) {
                if(board[r][c]===EMPTY) continue;
                for(let [dr,dc] of DIRS) {
                    let cnt=0, empty=0;
                    for(let i=0;i<5;i++){
                        let nr=r+dr*i, nc=c+dc*i;
                        if(nr<0||nr>=SIZE||nc<0||nc>=SIZE) break;
                        if(board[nr][nc]===board[r][c]) cnt++;
                        else if(board[nr][nc]===EMPTY) empty++;
                        else break;
                    }
                    if(cnt===5) { board[r][c]===AI ? ai+=100000 : hu+=100000; }
                    else if(cnt===4&&empty===1) { board[r][c]===AI ? ai+=12000 : hu+=12000; }
                    else if(cnt===3&&empty===2) { board[r][c]===AI ? ai+=1500 : hu+=1500; }
                }
            }
            return ai - hu;
        }

        const MAX_DEPTH = 3; // Đủ mạnh + cực nhanh
        function minimax(depth, alpha, beta, maximizing) {
            if (depth === 0 || checkWinAround(HUMAN, lastMove?.r, lastMove?.c) || checkWinAround(AI, lastMove?.r, lastMove?.c)) return evaluate();
            let cands = getCandidates();
            if (!cands.length) return evaluate();

            if (maximizing) {
                let maxEval = -Infinity;
                for (let {r,c} of cands) {
                    board[r][c] = AI; lastMove={r,c};
                    let ev = minimax(depth-1, alpha, beta, false);
                    board[r][c] = EMPTY;
                    maxEval = Math.max(maxEval, ev);
                    alpha = Math.max(alpha, ev);
                    if (beta <= alpha) break;
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (let {r,c} of cands) {
                    board[r][c] = HUMAN; lastMove={r,c};
                    let ev = minimax(depth-1, alpha, beta, true);
                    board[r][c] = EMPTY;
                    minEval = Math.min(minEval, ev);
                    beta = Math.min(beta, ev);
                    if (beta <= alpha) break;
                }
                return minEval;
            }
        }

        function aiMove() {
            if (gameOver || isAiThinking) return;
            isAiThinking = true;
            setStatus("🤖 AI đang tính...");
            
            setTimeout(() => {
                // 1. Ưu tiên thắng/chặn ngay
                let imm = getImmediateMove();
                if (imm) {
                    board[imm.r][imm.c] = AI; lastMove = imm;
                    renderBoard(); checkEnd(); isAiThinking = false; return;
                }
                // 2. Minimax với ứng viên đã lọc
                let best = null, bestScore = -Infinity;
                let cands = getCandidates();
                for (let {r,c} of cands) {
                    board[r][c] = AI; lastMove={r,c};
                    let sc = minimax(MAX_DEPTH-1, -Infinity, Infinity, false);
                    board[r][c] = EMPTY;
                    if (sc > bestScore) { bestScore = sc; best = {r,c}; }
                }
                if (best) {
                    board[best.r][best.c] = AI; lastMove = best;
                    renderBoard(); checkEnd();
                }
                isAiThinking = false;
            }, 50);
        }

        function checkEnd() {
            if (checkWinAround(AI, lastMove.r, lastMove.c)) { setStatus("🤖 AI thắng! Chơi lại?"); gameOver = true; }
            else setStatus("Lượt của bạn (X)");
        }

        // ================= UI & GAME LOOP =================
        function initBoard() {
            const b = document.getElementById('board'); b.innerHTML='';
            for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
                let d = document.createElement('div'); d.className='cell'; d.dataset.r=r; d.dataset.c=c;
                d.onclick=()=>handleMove(r,c); b.appendChild(d);
            }
        }
        function renderBoard() {
            document.querySelectorAll('.cell').forEach(c => {
                let r=+c.dataset.r, col=+c.dataset.c; c.className='cell'; c.textContent='';
                if(board[r][col]===HUMAN) {c.textContent='X'; c.classList.add('x','taken');}
                if(board[r][col]===AI) {c.textContent='O'; c.classList.add('o','taken');}
                if(lastMove && lastMove.r===r && lastMove.c===col) c.classList.add('last');
            });
        }
        function setStatus(m){document.getElementById('status').textContent=m;}
        function handleMove(r,c) {
            if(gameOver||isAiThinking||board[r][c]!==EMPTY) return;
            board[r][c]=HUMAN; lastMove={r,c}; renderBoard();
            if(checkWinAround(HUMAN,r,c)) { setStatus("🎉 Bạn thắng! Tuyệt vời!"); gameOver=true; return; }
            aiMove();
        }
        function resetGame() {
            board=Array(SIZE).fill().map(()=>Array(SIZE).fill(EMPTY)); gameOver=false; isAiThinking=false; lastMove=null;
            renderBoard(); setStatus("Lượt của bạn (X)");
        }
    </script>
</body>
</html>
