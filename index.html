<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 28 Concept</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .phone-frame {
            width: 393px;
            height: 852px;
            background: #1a1a2e;
            border-radius: 55px;
            padding: 12px;
            box-shadow: 
                0 0 0 3px #3a3a5c,
                0 0 0 6px #1a1a2e,
                0 25px 80px rgba(0, 0, 0, 0.5),
                inset 0 0 60px rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: url('https://image.qwenlm.ai/public_source/a83fe88b-0c37-4ecb-ad7c-84df1e249377/155f24c3f-907f-4451-9f77-739481bed0b1.png') center/cover;
            border-radius: 45px;
            overflow: hidden;
            position: relative;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 28px 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            position: relative;
            z-index: 10;
        }

        .dynamic-island {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 125px;
            height: 37px;
            background: #000;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .dynamic-island:hover {
            width: 200px;
            height: 55px;
        }

        .dynamic-island-content {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .dynamic-island:hover .dynamic-island-content {
            opacity: 1;
        }

        .dynamic-island .camera {
            width: 12px;
            height: 12px;
            background: #1a1a2e;
            border-radius: 50%;
            position: absolute;
            right: 25px;
        }

        .dynamic-island .sensor {
            width: 8px;
            height: 8px;
            background: #2a2a4e;
            border-radius: 50%;
            position: absolute;
            right: 10px;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-icons svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .battery-icon {
            width: 26px;
            height: 12px;
            border: 2px solid white;
            border-radius: 4px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 1px;
        }

        .battery-icon::after {
            content: '';
            position: absolute;
            right: -4px;
            width: 3px;
            height: 6px;
            background: white;
            border-radius: 0 2px 2px 0;
        }

        .battery-level {
            height: 100%;
            width: 75%;
            background: white;
            border-radius: 2px;
        }

        .widget-area {
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .widget {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 22px;
            padding: 16px;
            color: white;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
        }

        .widget:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.2);
        }

        .widget-large {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .widget-date {
            text-align: center;
        }

        .widget-date .day {
            font-size: 14px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .widget-date .number {
            font-size: 48px;
            font-weight: 200;
            line-height: 1;
        }

        .widget-weather {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .widget-weather .temp {
            font-size: 36px;
            font-weight: 300;
        }

        .widget-weather .condition {
            font-size: 13px;
            opacity: 0.8;
        }

        .widget-weather svg {
            width: 40px;
            height: 40px;
            fill: #FFD700;
            margin-bottom: 4px;
        }

        .widget-music {
            grid-column: span 2;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .widget-music .album-art {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .widget-music .album-art svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .widget-music .info {
            flex: 1;
        }

        .widget-music .title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .widget-music .artist {
            font-size: 13px;
            opacity: 0.7;
        }

        .widget-music .controls {
            display: flex;
            gap: 16px;
        }

        .widget-music .controls svg {
            width: 28px;
            height: 28px;
            fill: white;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .widget-music .controls svg:hover {
            transform: scale(1.1);
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px 14px;
            padding: 10px 20px;
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .app-item:hover {
            transform: scale(1.08);
        }

        .app-item:active {
            transform: scale(0.95);
        }

        .app-icon {
            width: 62px;
            height: 62px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-name {
            color: white;
            font-size: 11px;
            text-align: center;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            font-weight: 400;
        }

        .dock {
            position: absolute;
            bottom: 20px;
            left: 14px;
            right: 14px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            padding: 18px 16px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .dock .app-item .app-icon {
            width: 65px;
            height: 65px;
        }

        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 135px;
            height: 5px;
            background: white;
            border-radius: 3px;
            opacity: 0.8;
        }

        .page-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 15px 0;
        }

        .page-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transition: all 0.3s;
        }

        .page-dot.active {
            background: white;
            width: 20px;
            border-radius: 4px;
        }

        .notification {
            position: absolute;
            top: 60px;
            left: 20px;
            right: 20px;
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #34C759 0%, #30B350 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notification-icon svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .notification-message {
            font-size: 13px;
            opacity: 0.8;
        }

        .notification-time {
            font-size: 11px;
            opacity: 0.5;
        }

        .app-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #FF3B30;
            color: white;
            font-size: 11px;
            font-weight: 600;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }

        .search-bar {
            margin: 10px 24px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-bar:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .search-bar svg {
            width: 18px;
            height: 18px;
            fill: rgba(255, 255, 255, 0.6);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .app-icon.green { background: linear-gradient(180deg, #34C759 0%, #28A745 100%); }
        .app-icon.blue { background: linear-gradient(180deg, #007AFF 0%, #0056B3 100%); }
        .app-icon.gray { background: linear-gradient(180deg, #8E8E93 0%, #636366 100%); }
        .app-icon.orange { background: linear-gradient(180deg, #FF9500 0%, #CC7700 100%); }
        .app-icon.red { background: linear-gradient(180deg, #FF3B30 0%, #CC2F25 100%); }
        .app-icon.purple { background: linear-gradient(180deg, #AF52DE 0%, #8B3DB3 100%); }
        .app-icon.pink { background: linear-gradient(180deg, #FF2D55 0%, #CC2444 100%); }
        .app-icon.cyan { background: linear-gradient(180deg, #5AC8FA 0%, #42A0C8 100%); }
        .app-icon.white { background: linear-gradient(180deg, #FFFFFF 0%, #E5E5EA 100%); }
        .app-icon.black { background: linear-gradient(180deg, #1C1C1E 0%, #000000 100%); }

        .app-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }
    </style>
</head>

                </div>
                <div class="app-item" onclick="openApp('Notes')">
                    <div class="app-icon" style="background: linear-gradient(180deg, #FFCC00 0%, #FF9500 100%);">

                    <span class="app-name">Notes</span>
                </div>

    <script>
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = `${hours}:${minutes}`;
            
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            document.getElementById('weekday').textContent = days[now.getDay()];
            document.getElementById('dayNumber').textContent = now.getDate();
        }

        function openApp(appName) {
            const notification = document.getElementById('notification');
            notification.classList.remove('show');
            
            setTimeout(() => {
                alert(`Opening ${appName}...`);
            }, 150);
        }

        document.getElementById('dynamicIsland').addEventListener('click', function() {
            this.classList.toggle('expanded');
        });

        document.querySelector('.search-bar').addEventListener('click', function() {
            const query = prompt('Search iOS 28...');
            if (query) {
                alert(`Searching for: ${query}`);
            }
        });

        document.getElementById('notification').addEventListener('click', function() {
            this.classList.remove('show');
            alert('Opening Messages...');
        });

        setInterval(updateTime, 1000);
        updateTime();

        setTimeout(() => {
            document.getElementById('notification').classList.add('show');
        }, 2000);

        const appItems = document.querySelectorAll('.app-item');
        appItems.forEach(item => {
            item.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.95)';
            });
            item.addEventListener('touchend', function() {
                this.style.transform = 'scale(1)';
            });
        });
    </script>
