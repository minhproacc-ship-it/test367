<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Key Generator</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 500px; margin: auto; }
    input, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
    #result { background: #f4f4f4; padding: 10px; margin-top: 10px; word-break: break-all; }
  </style>
</head>
<body>
  <h2>🔑 Tạo Key Script</h2>
  <input id="pass" type="password" placeholder="Admin Password">
  <input id="max_uses" type="number" value="1" min="1" placeholder="Số lần dùng tối đa">
  <input id="days" type="number" value="30" min="1" placeholder="Hạn sử dụng (ngày)">
  <button onclick="generate()">Tạo Key</button>
  <div id="result"></div>

  <script>
    async function generate() {
      const pass = document.getElementById('pass').value;
      const max_uses = parseInt(document.getElementById('max_uses').value);
      const days = parseInt(document.getElementById('days').value);
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass, max_uses, days })
      });
      const data = await res.json();
      document.getElementById('result').textContent = data.key ? data.key : (data.error || 'Lỗi');
    }
  </script>
</body>
</html>
