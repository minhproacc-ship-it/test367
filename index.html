<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhlords Browser & Search</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --surface: #ffffff;
            --border: #e0e0e0;
            --primary: #4285f4;
            --primary-hover: #3367d6;
            --text: #202124;
            --text-secondary: #5f6368;
            --tab-bg: #e8e8e8;
            --tab-active: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .browser-container {
            width: 95vw;
            height: 90vh;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            align-items: center;
            background: var(--tab-bg);
            padding: 8px 12px;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .tabs {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            overflow-x: auto;
        }

        .tab {
            background: var(--surface);
            padding: 6px 12px;
            border-radius: 8px 8px 0 0;
            font-size: 13px;
            cursor: pointer;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative;
        }

        .tab.active {
            background: var(--tab-active);
            font-weight: 500;
            box-shadow: 0 -2px 0 var(--primary);
        }

        .new-tab-btn {
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 50%;
            color: var(--text-secondary);
        }

        .new-tab-btn:hover { background: #d0d0d0; }

        .controls { display: flex; gap: 6px; }
        .controls button {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-secondary);
        }
        .controls button:hover { background: #f0f0f0; }
        .controls button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Address Bar */
        .address-bar {
            padding: 8px 12px;
            background: #f8f9fa;
            border-bottom: 1px solid var(--border);
        }

        #url-input {
            width: 100%;
            padding: 9px 14px;
            border-radius: 22px;
            border: 1px solid var(--border);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #url-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        /* Content Area */
        .content-area { flex: 1; position: relative; overflow: hidden; }
        .page { display: none; width: 100%; height: 100%; }
        .page.active { display: block; }

        #home-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: var(--surface);
            height: 100%;
        }

        .logo {
            font-size: 52px;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #4285f4, #34a853, #fbbc05, #ea4335);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .tagline {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 16px;
        }

        .search-box {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 580px;
        }

        #search-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid var(--border);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        #search-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        #search-btn:hover { background: var(--primary-hover); }

        iframe {
            border: none;
            background: var(--surface);
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            border: 3px solid #e0e0e0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        .fallback-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.5;
            display: none;
        }

        @media (max-width: 768px) {
            .browser-container { width: 100vw; height: 100vh; border-radius: 0; }
            .logo { font-size: 40px; }
            .search-box { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="browser-container">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="tabs">
                <div class="tab active" data-url="minhlords://home">Minhlords Home</div>
                <button class="new-tab-btn" title="New Tab">+</button>
            </div>
            <div class="controls">
                <button id="back-btn" title="Back">←</button>
                <button id="forward-btn" title="Forward">→</button>
                <button id="refresh-btn" title="Refresh">↻</button>
            </div>
        </div>

        <!-- Address Bar -->
        <div class="address-bar">
            <input type="text" id="url-input" placeholder="Search or enter web address (e.g., example.com)">
        </div>

        <!-- Content Area -->
        <div class="content-area">
            <div id="home-page" class="page active">
                <h1 class="logo">Minhlords</h1>
                <p class="tagline">Fast. Private. Yours.</p>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search the web...">
                    <button id="search-btn">Search</button>
                </div>
            </div>
            <div id="web-view-container" class="page">
                <iframe id="web-view" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation-by-user-activation"></iframe>
                <div class="loader" id="loader"></div>
                <div class="fallback-msg" id="fallback">
                    ⚠️ This site blocks embedding for security reasons.<br>
                    <a href="#" id="open-external" target="_blank" style="color: var(--primary);">Open in new tab</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabsContainer = document.querySelector('.tabs');
            const newTabBtn = document.querySelector('.new-tab-btn');
            const urlInput = document.getElementById('url-input');
            const searchInput = document.getElementById('search-input');
            const searchBtn = document.getElementById('search-btn');
            const webView = document.getElementById('web-view');
            const homePage = document.getElementById('home-page');
            const webViewContainer = document.getElementById('web-view-container');
            const loader = document.getElementById('loader');
            const fallback = document.getElementById('fallback');
            const openExternal = document.getElementById('open-external');
            const backBtn = document.getElementById('back-btn');
            const forwardBtn = document.getElementById('forward-btn');
            const refreshBtn = document.getElementById('refresh-btn');

            let tabs = [{ id: 1, url: 'minhlords://home', title: 'Minhlords Home', active: true }];
            let tabCounter = 1;
            let iframeBlocked = false;

            function renderTabs() {
                tabsContainer.innerHTML = '';
                tabs.forEach(tab => {
                    const el = document.createElement('div');
                    el.className = `tab ${tab.active ? 'active' : ''}`;
                    el.textContent = tab.title;
                    el.onclick = () => switchTab(tab.id);
                    tabsContainer.appendChild(el);
                });
                tabsContainer.appendChild(newTabBtn);
            }

            function switchTab(id) {
                tabs.forEach(t => t.active = (t.id === id));
                const activeTab = tabs.find(t => t.active);
                renderTabs();
                updateUI(activeTab);
            }

            function updateUI(tab) {
                if (tab.url === 'minhlords://home') {
                    homePage.classList.add('active');
                    webViewContainer.classList.remove('active');
                    urlInput.value = '';
                    backBtn.disabled = true;
                    forwardBtn.disabled = true;
                } else {
                    homePage.classList.remove('active');
                    webViewContainer.classList.add('active');
                    urlInput.value = tab.url;
                    loadURL(tab.url);
                    backBtn.disabled = false;
                    forwardBtn.disabled = true;
                }
            }

            function loadURL(url) {
                loader.style.display = 'block';
                fallback.style.display = 'none';
                iframeBlocked = false;
                openExternal.href = url;

                webView.src = url;
                webView.onload = () => {
                    loader.style.display = 'none';
                    try {
                        // Cross-origin check
                        if (webView.contentWindow.document && webView.contentWindow.document.domain) {
                            iframeBlocked = false;
                        }
                    } catch (e) {
                        iframeBlocked = true;
                    }
                    if (iframeBlocked) {
                        fallback.style.display = 'block';
                    }
                };
            }

            function createTab(url = 'minhlords://home') {
                tabCounter++;
                const newTab = {
                    id: tabCounter,
                    url,
                    title: url === 'minhlords://home' ? 'Minhlords Home' : (url.startsWith('http') ? new URL(url).hostname : url),
                    active: false
                };
                tabs.forEach(t => t.active = false);
                newTab.active = true;
                tabs.push(newTab);
                renderTabs();
                updateUI(newTab);
            }

            function navigateTo(input) {
                let url = input.trim();
                if (!url) return;

                if (!url.startsWith('http') && !url.includes('://')) {
                    // Check if it looks like a URL
                    if (url.includes('.') && !url.includes(' ')) {
                        url = 'https://' + url;
                    } else {
                        // Treat as search
                        url = `https://www.google.com/search?q=${encodeURIComponent(url)}`;
                    }
                }

                const activeTab = tabs.find(t => t.active);
                activeTab.url = url;
                activeTab.title = url.startsWith('https://www.google.com') ? `Search: ${input.trim()}` : new URL(url).hostname;
                renderTabs();
                updateUI(activeTab);
            }

            // Event Listeners
            newTabBtn.onclick = () => createTab();
            urlInput.addEventListener('keypress', e => { if (e.key === 'Enter') navigateTo(urlInput.value); });
            searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') navigateTo(searchInput.value); });
            searchBtn.onclick = () => navigateTo(searchInput.value);

            backBtn.onclick = () => {
                if (!iframeBlocked) webView.contentWindow?.history?.back();
                else alert('Back navigation restricted for security.');
            };
            forwardBtn.onclick = () => {
                if (!iframeBlocked) webView.contentWindow?.history?.forward();
                else alert('Forward navigation restricted for security.');
            };
            refreshBtn.onclick = () => {
                if (webView.classList.contains('active')) {
                    loader.style.display = 'block';
                    webView.src = webView.src;
                }
            };

            renderTabs();
            updateUI(tabs[0]);
        });
    </script>
</body>
</html>
